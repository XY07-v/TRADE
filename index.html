<!DOCTYPE html>
<html>
<head>
    <title>Power Trade - Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Sistema de Registro POWER_TRADE</h2>
    <hr>
    
    <div class="row mb-4">
        <div class="col-md-6">
            <label>Seleccione el Formulario (Colección):</label>
            <select id="selColeccion" class="form-select">
                {% for col in colecciones %}
                <option value="{{ col }}">{{ col }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-6">
            <label>Buscar Punto (BMB o Nombre):</label>
            <input type="text" id="busqueda" class="form-control" placeholder="Escriba para buscar...">
            <div id="resultados" class="list-group mt-2"></div>
        </div>
    </div>

    <script>
        const busqueda = document.getElementById('busqueda');
        const resultadosDiv = document.getElementById('resultados');
        const selColeccion = document.getElementById('selColeccion');

        busqueda.addEventListener('input', async (e) => {
            const q = e.target.value;
            if(q.length < 2) { resultadosDiv.innerHTML = ''; return; }

            const res = await fetch(`/buscar_punto?q=${q}`);
            const data = await res.json();
            
            resultadosDiv.innerHTML = data.map(p => `
                <a href="/formulario/${selColeccion.value}/${p.id}" class="list-group-item list-group-item-action">
                    <b>${p.bmb}</b> - ${p.nombre}
                </a>
            `).join('');
        });
    </script>
</body>
</html>
