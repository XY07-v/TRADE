<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Trade | Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-900 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-10 text-center">
        <h1 class="text-3xl font-black italic text-blue-900 mb-2">POWER TRADE</h1>
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-8">Acceso al Sistema Enterprise</p>

        {% if error %}
        <div class="bg-red-50 text-red-500 text-xs font-bold p-4 rounded-2xl mb-6 border border-red-100">
            <i class="fa-solid fa-triangle-exclamation mr-2"></i> {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-4">
            <div class="text-left">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-4">Usuario</label>
                <input type="text" name="username" required class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
            </div>
            <div class="text-left">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-4">Contraseña</label>
                <input type="password" name="password" required class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
            </div>
            
            <button type="submit" class="w-full bg-blue-900 text-white py-5 rounded-2xl font-black uppercase tracking-tighter hover:bg-blue-800 transition-all shadow-xl">
                Entrar al Sistema
            </button>
        </form>
        
        <p class="mt-8 text-[9px] text-slate-300 font-bold uppercase">© 2026 Power Trade S.A.</p>
    </div>
</body>
</html>
