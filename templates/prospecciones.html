{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <form action="/guardar_dinamico/{{ tipo_url }}" method="POST" class="bg-white p-6 rounded-[40px] shadow-2xl border border-slate-100 space-y-6">
        <h2 class="text-blue-900 font-black uppercase text-sm flex items-center gap-3 border-b pb-4">
            <i class="fa-solid {{ icono }} text-xl"></i> {{ titulo }}
        </h2>

        <div class="space-y-5">
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Asesor Responsable</label>
                <select name="funcionario" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm shadow-inner" required>
                    <option value="">Seleccione...</option>
                    {% for f in funcionarios %}<option value="{{f}}">{{f}}</option>{% endfor %}
                </select>
            </div>

            {% for p in preguntas %}
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2">{{ p.label }} {% if p.required %}*{% endif %}</label>
                
                {% if p.type == 'multiselect' %}
                    <select name="{{ p.id }}" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm min-h-[140px] shadow-inner" multiple {% if p.required %}required{% endif %}>
                        {% for opt in p.options %}<option value="{{ opt }}" class="py-2 px-2 border-b border-slate-100 last:border-0">{{ opt }}</option>{% endfor %}
                    </select>
                    <p class="text-[8px] text-blue-500 font-bold ml-2">Celular: Toca varios | PC: Ctrl + Clic</p>

                {% elif p.type == 'select' %}
                    <select name="{{ p.id }}" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm shadow-inner" {% if p.required %}required{% endif %}>
                        <option value="">Seleccione...</option>
                        {% for opt in p.options %}<option value="{{ opt }}">{{ opt }}</option>{% endfor %}
                    </select>

                {% elif p.type == 'textarea' %}
                    <textarea name="{{ p.id }}" rows="3" class="w-full p-4 bg-slate-50 rounded-2xl outline-none text-sm shadow-inner" placeholder="..." {% if p.required %}required{% endif %}></textarea>

                {% else %}
                    <input type="{{ p.type }}" name="{{ p.id }}" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm shadow-inner" placeholder="..." {% if p.required %}required{% endif %}>
                {% endif %}
            </div>
            {% endfor %}
        </div>

        <button type="submit" class="w-full bg-blue-900 text-white font-black py-5 rounded-[30px] uppercase shadow-xl hover:scale-[1.02] transition-all flex items-center justify-center gap-3">
            <i class="fa-solid fa-floppy-disk"></i> Guardar Registro
        </button>
    </form>
</div>
{% endblock %}
