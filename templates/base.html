<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Trade Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .main-container { max-width: 1200px; margin: 0 auto; }
        .nav-link { transition: all 0.3s; }
        .nav-link:hover { color: #93c5fd; }
    </style>
</head>
<body class="bg-slate-100 flex flex-col min-h-screen">
    <header class="bg-blue-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="main-container flex justify-between items-center">
            <h1 class="font-black italic uppercase tracking-tighter text-xl">Power Trade</h1>
            <nav class="hidden md:flex gap-8 text-[11px] font-black uppercase">
                <a href="/" class="nav-link">Visitas</a>
                <a href="/prospecciones" class="nav-link">Historial</a>
                <a href="/registros" class="nav-link">Prospección</a>
                <a href="/Food" class="nav-link">Food</a>
            </nav>
        </div>
    </header>

    <main class="main-container flex-grow p-4 w-full pb-32">
        {% block content %}{% endblock %}
    </main>

    <footer class="fixed bottom-16 left-0 right-0 bg-white/80 backdrop-blur-md text-[8px] text-slate-400 text-center py-2 border-t font-black tracking-widest uppercase z-40">
        Desarrollado por Andres Vanegas
    </footer>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center h-16 z-50 shadow-2xl">
        <a href="/" class="flex flex-col items-center text-slate-400"><i class="fa-solid fa-file-signature"></i><span class="text-[8px] mt-1 font-bold">VISITA</span></a>
        <a href="/prospecciones" class="flex flex-col items-center text-slate-400"><i class="fa-solid fa-magnifying-glass-location"></i><span class="text-[8px] mt-1 font-bold">PROSPECTO</span></a>
        <a href="/Food" class="flex flex-col items-center text-slate-400"><i class="fa-solid fa-magnifying-glass-location"></i><span class="text-[8px] mt-1 font-bold">FOOD</span></a>
        <a href="/registros" class="flex flex-col items-center text-slate-400"><i class="fa-solid fa-clock-history"></i><span class="text-[8px] mt-1 font-bold">HISTORIAL</span></a>
    </nav>
</body>
</html>
