<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Power Trade</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F2F2F7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 85%; max-width: 320px; text-align: center; }
        h2 { color: #1c1c1e; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 12px; background: #007AFF; color: white; border: none; border-radius: 10px; font-weight: 600; font-size: 16px; cursor: pointer; }
        .error { color: #FF3B30; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Power Trade</h2>
        <form method="POST">
            <input type="number" name="cc" placeholder="Número de Cédula" required>
            <button type="submit">Entrar</button>
        </form>
        {% if error %} <p class="error">{{ error }}</p> {% endif %}
    </div>
</body>
</html>
