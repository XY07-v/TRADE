<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, sans-serif; background: #F2F2F7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 280px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: none; background: #F2F2F7; border-radius: 10px; box-sizing: border-box; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 12px; background: #007AFF; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login">
        <h3>Power Trade Login</h3>
        <form method="POST">
            <input type="number" name="cc" placeholder="Cédula" required>
            <button type="submit">Entrar</button>
        </form>
        {% if error %}<p style="color:red; font-size:12px;">{{ error }}</p>{% endif %}
    </div>
</body>
</html>
