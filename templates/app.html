<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Power Trade</title>
    <style>
        :root { --blue: #007AFF; --bg: #F2F2F7; --red: #FF3B30; --green: #34C759; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .view { display: none; padding: 20px; }
        .active { display: block; }
        .card { background: white; border-radius: 15px; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .tabs { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 65px; border-top: 1px solid #ddd; }
        .tab { flex: 1; text-align: center; font-size: 10px; color: #8e8e93; padding-top: 12px; }
        .tab.active { color: var(--blue); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: none; background: var(--bg); border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .btn-query { background: #5856D6; margin-bottom: 10px; }
    </style>
</head>
<body>

<div style="background:white; padding:15px; display:flex; justify-content:space-between; align-items:center;">
    <b>Power Trade</b>
    <a href="/logout" style="color:var(--red); text-decoration:none; font-size:12px;">Cerrar Sesión</a>
</div>

<div id="v1" class="view active">
    <h3>Nuevo Punto</h3>
    <div class="card">
        <input type="number" id="p_bmb" placeholder="BMB">
        <input type="text" id="p_nombre" placeholder="Nombre">
        <input type="text" id="p_gps" readonly placeholder="Cargando GPS...">
        <button class="btn" onclick="savePunto()">Guardar Punto</button>
    </div>
</div>

<div id="v2" class="view">
    <h3>Registrar Visita</h3>
    <div class="card">
        <input type="text" id="q_visita" placeholder="Nombre o BMB...">
        <button class="btn btn-query" onclick="buscar('visita')">Consultar</button>
        <div id="res_visita"></div>
    </div>
    <div id="f_visita" class="card" style="display:none;">
        <h4 id="v_tit"></h4>
        <select id="v_tipo"><option>Fuera de rango</option><option>Error de trade</option></select>
        <textarea id="v_obs" placeholder="Observaciones"></textarea>
        <input type="file" id="img1" accept="image/*" capture="camera">
        <input type="file" id="img2" accept="image/*" capture="camera">
        <button class="btn" onclick="saveVisita()">Enviar Visita</button>
    </div>
</div>

<div id="v3" class="view">
    <h3>Listado Puntos</h3>
    <div class="card">
        <input type="text" id="q_puntos" placeholder="Buscar BMB o Punto...">
        <button class="btn btn-query" onclick="buscar('puntos')">Consultar</button>
    </div>
    <div id="res_puntos"></div>
</div>

<div id="v4" class="view">
    <h3>Reporte</h3>
    <div class="card">
        <label>Desde:</label><input type="date" id="f_ini">
        <label>Hasta:</label><input type="date" id="f_fin">
        <button class="btn" style="background:var(--green);" onclick="descargar()">Descargar Excel</button>
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="nav(1, this)">➕ Nuevo</div>
    <div class="tab" onclick="nav(2, this)">📝 Visita</div>
    <div class="tab" onclick="nav(3, this)">🏢 Puntos</div>
    <div class="tab" onclick="nav(4, this)">📊 Reporte</div>
</div>

<script>
    let miGPS = "";
    let pSel = null;

    function nav(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('v'+id).classList.add('active');
        el.classList.add('active');
    }

    async function buscar(tipo) {
        const val = (tipo === 'visita') ? document.getElementById('q_visita').value : document.getElementById('q_puntos').value;
        const r = await fetch(`/api/buscar_puntos?q=${val}`);
        const data = await r.json();
        const div = (tipo === 'visita') ? document.getElementById('res_visita') : document.getElementById('res_puntos');
        div.innerHTML = "";
        data.forEach(p => {
            let d = document.createElement('div');
            d.className = "card";
            d.innerHTML = `<b>${p.BMB}</b> - ${p['Nombre de punto']}`;
            d.onclick = () => {
                if(tipo === 'visita'){
                    pSel = p;
                    document.getElementById('f_visita').style.display = "block";
                    document.getElementById('v_tit').innerText = p['Nombre de punto'];
                    div.innerHTML = "";
                }
            };
            div.appendChild(d);
        });
    }

    function descargar() {
        const i = document.getElementById('f_ini').value;
        const f = document.getElementById('f_fin').value;
        if(!i || !f) return alert("Fechas incompletas");
        window.location.href = `/api/descargar_reporte?inicio=${i}&fin=${f}`;
    }

    async function saveVisita() {
        const payload = {
            "Nombre de punto": pSel['Nombre de punto'],
            "BMB": pSel.BMB,
            "tipo": document.getElementById('v_tipo').value,
            "observacion": document.getElementById('v_obs').value,
            "ubicacion_punto": pSel.Ubicacion,
            "ubicacion_actual": miGPS
        };
        await fetch('/api/guardar_visita', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
        alert("Guardado OK"); location.reload();
    }

    window.onload = () => {
        navigator.geolocation.getCurrentPosition(p => {
            miGPS = `${p.coords.latitude}, ${p.coords.longitude}`;
            document.getElementById('p_gps').value = miGPS;
        });
    }
</script>
</body>
</html>
