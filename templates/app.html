<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Power Trade App</title>
    <style>
        :root { --blue: #007AFF; --bg: #F2F2F7; --red: #FF3B30; --green: #34C759; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .view { display: none; padding: 20px; }
        .active { display: block; }
        .card { background: white; border-radius: 15px; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px; }
        
        /* Menu Inferior */
        .tabs { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 65px; border-top: 1px solid #ddd; z-index: 100; }
        .tab { flex: 1; text-align: center; font-size: 10px; color: #8e8e93; padding-top: 12px; }
        .tab.active { color: var(--blue); }
        .tab-icon { font-size: 20px; display: block; margin-bottom: 2px; }

        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: none; background: var(--bg); border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<div style="background:white; padding:15px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee;">
    <b>Power Trade</b>
    <span style="font-size:12px; color:var(--red);" onclick="location.href='/logout'">Cerrar Sesión</span>
</div>

<div id="v1" class="view active">
    <h3>Nuevo Punto</h3>
    <div class="card">
        <label>BMB</label>
        <input type="number" id="p_bmb" placeholder="Ej: 5050">
        <label>Nombre del Punto</label>
        <input type="text" id="p_nombre" placeholder="Ej: Tienda X">
        <label>Ciudad</label>
        <select id="p_ciudad" onchange="updDepto()">
            <option value="Bogotá">Bogotá</option>
            <option value="Medellín">Medellín</option>
            <option value="Cali">Cali</option>
        </select>
        <label>Departamento</label>
        <input type="text" id="p_depto" value="Cundinamarca" readonly>
        <label>Dirección (Auto)</label>
        <input type="text" id="p_dir" readonly>
        <label>Coordenadas</label>
        <input type="text" id="p_gps" readonly>
        <button class="btn" onclick="savePunto()">Guardar Punto</button>
    </div>
</div>

<div id="v2" class="view">
    <h3>Visita</h3>
    <div class="card">
        <input type="text" id="search" placeholder="🔍 Buscar BMB o Nombre..." onkeyup="searchP()">
        <div id="results"></div>
    </div>
    <div id="f_visita" class="card" style="display:none;">
        <h4 id="v_tit"></h4>
        <select id="v_tipo"><option>Fuera de rango</option><option>Error de trade</option></select>
        <textarea id="v_obs" placeholder="Observaciones..."></textarea>
        <label>Foto 1</label><input type="file" id="img1" accept="image/*" capture="camera">
        <label>Foto 2</label><input type="file" id="img2" accept="image/*" capture="camera">
        <button class="btn" onclick="saveVisita()">Enviar Visita</button>
    </div>
</div>

<div id="v3" class="view">
    <h3>Puntos Registrados</h3>
    <div id="list_puntos"></div>
</div>

<div id="v4" class="view">
    <h3>Historial Visitas</h3>
    <div id="hist"></div>
</div>

<div class="tabs">
    <div class="tab active" onclick="nav(1, this)"><span class="tab-icon">➕</span>Nuevo</div>
    <div class="tab" onclick="nav(2, this)"><span class="tab-icon">📝</span>Visita</div>
    <div class="tab" onclick="nav(3, this)"><span class="tab-icon">🏢</span>Puntos</div>
    <div class="tab" onclick="nav(4, this)"><span class="tab-icon">📊</span>Reporte</div>
</div>

<script>
    let miGPS = "";
    let dataPuntos = [];

    function nav(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('v'+id).classList.add('active');
        el.classList.add('active');
        if(id === 2 || id === 3) loadPuntos();
        if(id === 4) loadHist();
    }

    function updDepto() {
        const d = {"Bogotá":"Cundinamarca","Medellín":"Antioquia","Cali":"Valle del Cauca"};
        document.getElementById('p_depto').value = d[document.getElementById('p_ciudad').value];
    }

    function getLoc() {
        navigator.geolocation.getCurrentPosition(async p => {
            miGPS = `${p.coords.latitude}, ${p.coords.longitude}`;
            if(document.getElementById('p_gps')) document.getElementById('p_gps').value = miGPS;
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.coords.latitude}&lon=${p.coords.longitude}`);
            const d = await res.json();
            if(document.getElementById('p_dir')) document.getElementById('p_dir').value = d.display_name.split(',')[0];
        }, null, {enableHighAccuracy: true});
    }

    async function savePunto() {
        const payload = {
            "BMB": document.getElementById('p_bmb').value,
            "Nombre de punto": document.getElementById('p_nombre').value,
            "Ciudad": document.getElementById('p_ciudad').value,
            "Departamento": document.getElementById('p_depto').value,
            "Direccion": document.getElementById('p_dir').value,
            "Ubicacion": document.getElementById('p_gps').value,
            "Rango": 200,
            "Estado": "Habilitado",
            "Desarrollador": "{{ usuario }}"
        };

        const r = await fetch('/api/guardar_punto', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(payload)
        });
        const res = await r.json();
        if(r.ok) { alert("✅ Punto Creado"); location.reload(); } else { alert("❌ Error: " + res.msg); }
    }

    async function loadPuntos() {
        const r = await fetch('/api/puntos');
        dataPuntos = await r.json();
        const div = document.getElementById('list_puntos');
        div.innerHTML = "";
        dataPuntos.forEach(p => {
            div.innerHTML += `<div class="card"><b>${p['Nombre de punto']}</b><br><small>BMB: ${p.BMB} | ${p.Ciudad}</small></div>`;
        });
    }

    function searchP() {
        const q = document.getElementById('search').value.toLowerCase();
        const res = document.getElementById('results');
        res.innerHTML = "";
        dataPuntos.filter(p => p.BMB.toString().includes(q) || p['Nombre de punto'].toLowerCase().includes(q)).forEach(p => {
            let d = document.createElement('div');
            d.style = "padding:10px; border-bottom:1px solid #eee;";
            d.innerText = `[${p.BMB}] ${p['Nombre de punto']}`;
            d.onclick = () => {
                document.getElementById('f_visita').style.display = "block";
                document.getElementById('v_tit').innerText = p['Nombre de punto'];
                document.getElementById('v_tit').dataset.gps = p.Ubicacion;
                document.getElementById('v_tit').dataset.bmb = p.BMB;
                res.innerHTML = "";
            };
            res.appendChild(d);
        });
    }

    async function saveVisita() {
        const payload = {
            "Nombre de punto": document.getElementById('v_tit').innerText,
            "BMB": document.getElementById('v_tit').dataset.bmb,
            "tipo": document.getElementById('v_tipo').value,
            "observacion": document.getElementById('v_obs').value,
            "ubicacion_punto": document.getElementById('v_tit').dataset.gps,
            "ubicacion_actual": miGPS,
            "rango_max": 200,
            "usuario": "{{ usuario }}"
        };
        const r = await fetch('/api/guardar_visita', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
        const res = await r.json();
        if(res.distancia > 200) alert("⚠️ Fuera de Rango: " + res.distancia + "m");
        alert("✅ Visita Guardada");
        nav(4, document.querySelectorAll('.tab')[3]);
    }

    async function loadHist() {
        const r = await fetch('/api/historial');
        const h = await r.json();
        const div = document.getElementById('hist');
        div.innerHTML = "";
        h.forEach(v => {
            const color = v.distancia_real > 200 ? 'border-left:5px solid var(--red)' : 'border-left:5px solid var(--green)';
            div.innerHTML += `<div class="card" style="${color}"><b>${v['Nombre de punto']}</b><br><small>${v.tipo} - ${v.distancia_real}m</small></div>`;
        });
    }

    window.onload = getLoc;
</script>
</body>
</html>
