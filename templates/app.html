<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Power Trade Pro</title>
    <style>
        :root { --blue: #007AFF; --bg: #F2F2F7; --red: #FF3B30; --green: #34C759; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .view { display: none; padding: 20px; }
        .active { display: block; }
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .tabs { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 65px; border-top: 1px solid #ddd; }
        .tab { flex: 1; text-align: center; font-size: 10px; color: #8e8e93; padding-top: 12px; }
        .tab.active { color: var(--blue); }
        .btn { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 10px; font-weight: 600; margin-top: 5px; }
        .btn-search { background: #5856D6; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: none; background: var(--bg); border-radius: 10px; box-sizing: border-box; }
        .res-item { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; background: white; }
    </style>
</head>
<body>

<div id="v1" class="view active">
    <h3>Nuevo Punto</h3>
    <div class="card">
        <input type="text" id="p_bmb" placeholder="BMB">
        <input type="text" id="p_nombre" placeholder="Nombre del Punto">
        <input type="text" id="p_dir" placeholder="Dirección (GPS)" readonly>
        <button class="btn" onclick="savePunto()">Guardar</button>
    </div>
</div>

<div id="v2" class="view">
    <h3>Registrar Visita</h3>
    <div class="card">
        <input type="text" id="q_visita" placeholder="Palabra clave o BMB...">
        <button class="btn btn-search" onclick="ejecutarBusqueda('visita')">Consultar Punto</button>
        <div id="res_visita"></div>
    </div>
    <div id="f_visita" class="card" style="display:none;">
        <h4 id="v_tit"></h4>
        <select id="v_tipo"><option>Fuera de rango</option><option>Error de trade</option></select>
        <textarea id="v_obs" placeholder="Observaciones..." style="width:100%; border:none; background:var(--bg); border-radius:10px; padding:10px;"></textarea>
        <label>Fotos (2)</label>
        <input type="file" id="img1" accept="image/*" capture="camera">
        <input type="file" id="img2" accept="image/*" capture="camera">
        <button class="btn" onclick="saveVisita()">Enviar</button>
    </div>
</div>

<div id="v3" class="view">
    <h3>Listado de Puntos</h3>
    <div class="card">
        <input type="text" id="q_puntos" placeholder="Buscar BMB o Nombre...">
        <button class="btn btn-search" onclick="ejecutarBusqueda('puntos')">Filtrar Puntos</button>
    </div>
    <div id="res_puntos"></div>
</div>

<div id="v4" class="view">
    <h3>Reporte de Visitas</h3>
    <div class="card">
        <label>Desde:</label>
        <input type="date" id="rep_inicio">
        <label>Hasta:</label>
        <input type="date" id="rep_fin">
        <button class="btn" style="background:var(--green);" onclick="descargarExcel()">Descargar Excel</button>
    </div>
    <div id="hist"></div>
</div>

<div class="tabs">
    <div class="tab active" onclick="nav(1, this)">➕ Nuevo</div>
    <div class="tab" onclick="nav(2, this)">📝 Visita</div>
    <div class="tab" onclick="nav(3, this)">🏢 Puntos</div>
    <div class="tab" onclick="nav(4, this)">📊 Reporte</div>
</div>

<script>
    let miGPS = "";
    let puntoSel = null;

    function nav(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('v'+id).classList.add('active');
        el.classList.add('active');
    }

    // BUSQUEDA DINÁMICA CON BOTÓN
    async function ejecutarBusqueda(tipo) {
        const query = (tipo === 'visita') ? document.getElementById('q_visita').value : document.getElementById('q_puntos').value;
        if(query.length < 2) return alert("Escribe al menos 2 letras");

        const r = await fetch(`/api/buscar_puntos?q=${query}`);
        const data = await r.json();
        const div = (tipo === 'visita') ? document.getElementById('res_visita') : document.getElementById('res_puntos');
        div.innerHTML = "";

        data.forEach(p => {
            const item = document.createElement('div');
            item.className = "res-item card";
            item.innerHTML = `<b>${p.BMB}</b> - ${p['Nombre de punto']}<br><small>${p.Ciudad}</small>`;
            item.onclick = () => {
                if(tipo === 'visita') {
                    puntoSel = p;
                    document.getElementById('f_visita').style.display = "block";
                    document.getElementById('v_tit').innerText = p['Nombre de punto'];
                    div.innerHTML = "";
                }
            };
            div.appendChild(item);
        });
    }

    function descargarExcel() {
        const ini = document.getElementById('rep_inicio').value;
        const fin = document.getElementById('rep_fin').value;
        if(!ini || !fin) return alert("Selecciona ambas fechas");
        window.location.href = `/api/descargar_reporte?inicio=${ini}&fin=${fin}`;
    }

    // (Otras funciones savePunto, saveVisita y getLoc se mantienen con la lógica de fechas corta)
    async function saveVisita() {
        const payload = {
            "Nombre de punto": puntoSel['Nombre de punto'],
            "BMB": puntoSel.BMB,
            "tipo": document.getElementById('v_tipo').value,
            "observacion": document.getElementById('v_obs').value,
            "ubicacion_punto": puntoSel.Ubicacion,
            "ubicacion_actual": miGPS,
            "rango_max": 200,
            "usuario": "{{ usuario }}"
        };
        await fetch('/api/guardar_visita', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
        alert("OK"); location.reload();
    }

    // Inicializar GPS al cargar
    window.onload = () => {
        navigator.geolocation.getCurrentPosition(p => {
            miGPS = `${p.coords.latitude}, ${p.coords.longitude}`;
        });
    }
</script>
</body>
</html>
