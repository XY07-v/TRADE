{% extends "layout.html" %}
{% block content %}
<div class="card" id="selector">
    <p><b>¿Qué deseas hacer?</b></p>
    <button class="btn-blue" onclick="mostrarBusqueda()">🔍 Punto Existente</button>
    <button class="btn-blue" style="background:var(--green); margin-top:10px;" onclick="mostrarNuevo()">➕ Crear Punto Nuevo</button>
</div>

<div id="sec_buscar" class="card" style="display:none;">
    <input type="text" id="q" placeholder="Buscar nombre o BMB..." onkeyup="buscar()">
    <div id="resultados_busqueda" style="margin-top:10px;"></div>
</div>

<div id="form_final" class="card" style="display:none;">
    <h3 id="tit_punto"></h3>
    <input type="hidden" id="es_nuevo" value="false">
    <input type="hidden" id="coord_punto">

    <label>Motivo:</label>
    <select id="motivo">
        <option value="Fuera de rango">Fuera de rango</option>
        <option value="Error App Trade">Error App Trade</option>
    </select>

    <label>Foto Máquina:*</label>
    <input type="file" id="f1" accept="image/*" capture="camera">
    
    <label>Foto Fachada:*</label>
    <input type="file" id="f2" accept="image/*" capture="camera">

    <textarea id="obs" placeholder="Observaciones..."></textarea>
    <button class="btn-blue" onclick="guardar()">GUARDAR REPORTE</button>
    <button onclick="location.reload()" style="background:none; border:none; color:grey; width:100%; margin-top:10px;">Cancelar</button>
</div>

<script>
let gps = "";
navigator.geolocation.getCurrentPosition(p => gps = `${p.coords.latitude},${p.coords.longitude}`);

function mostrarBusqueda() { 
    document.getElementById('selector').style.display = 'none';
    document.getElementById('sec_buscar').style.display = 'block';
}

function mostrarNuevo() {
    const nom = prompt("Nombre del punto nuevo:");
    const bmb = prompt("BMB:");
    if(!nom || !bmb) return;
    iniciarForm(nom, bmb, gps, true);
}

async function buscar() {
    const q = document.getElementById('q').value;
    if(q.length < 3) return;
    const r = await fetch(`/api/buscar?q=${q}`);
    const data = await r.json();
    const res = document.getElementById('resultados_busqueda');
    res.innerHTML = "";
    data.forEach(p => {
        let d = document.createElement('div');
        d.className = "card"; d.innerHTML = `<b>${p['Nombre de punto']}</b><br>${p.BMB}`;
        d.onclick = () => iniciarForm(p['Nombre de punto'], p.BMB, p.Ubicacion, false);
        res.appendChild(d);
    });
}

function iniciarForm(nom, bmb, ubi, nuevo) {
    document.getElementById('sec_buscar').style.display = 'none';
    document.getElementById('selector').style.display = 'none';
    document.getElementById('form_final').style.display = 'block';
    document.getElementById('tit_punto').innerText = nom;
    document.getElementById('coord_punto').value = ubi;
    document.getElementById('es_nuevo').value = nuevo;
}

async function guardar() {
    const fd = new FormData();
    fd.append('Nombre de punto', document.getElementById('tit_punto').innerText);
    fd.append('BMB', prompt("Confirma BMB:")); // Re-confirmación para seguridad
    fd.append('motivo', document.getElementById('motivo').value);
    fd.append('observacion', document.getElementById('obs').value);
    fd.append('ubicacion_punto', document.getElementById('coord_punto').value);
    fd.append('ubicacion_actual', gps);
    fd.append('es_nuevo', document.getElementById('es_nuevo').value);
    fd.append('foto_maquina', document.getElementById('f1').files[0]);
    fd.append('foto_fachada', document.getElementById('f2').files[0]);

    const r = await fetch('/api/guardar_todo', {method:'POST', body:fd});
    if(r.ok) { alert("¡Guardado!"); location.href="/"; }
}
</script>
{% endblock %}
