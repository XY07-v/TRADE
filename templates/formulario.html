{% extends "base.html" %}
{% block content %}
<form action="/guardar" method="POST" enctype="multipart/form-data" class="space-y-4">
    <div class="bg-white p-5 rounded-[30px] shadow-sm border">
        <label class="text-[10px] font-black text-slate-400 uppercase">Funcionario</label>
        <select name="funcionario" class="w-full p-3 bg-slate-50 rounded-xl mb-4 outline-none" required>
            <option value="">Seleccione...</option>
            {% for f in funcionarios %}<option value="{{f}}">{{f}}</option>{% endfor %}
        </select>

        <label class="text-[10px] font-black text-blue-900 uppercase">Punto de Venta</label>
        <input list="l_poc" id="i_poc" name="poc" oninput="sync('Poc')" class="w-full p-3 bg-slate-50 rounded-xl mb-2" placeholder="Nombre POC..." required>
        <datalist id="l_poc">{% for p in maestro %}<option value="{{p.Poc}}">{% endfor %}</datalist>
        
        <input list="l_bmb" id="i_bmb" name="bmb" oninput="sync('BMB')" class="w-full p-3 bg-slate-50 rounded-xl" placeholder="Código BMB..." required>
        <datalist id="l_bmb">{% for p in maestro %}<option value="{{p.BMB}}">{% endfor %}</datalist>

        <div class="mt-4 p-3 bg-blue-50 rounded-2xl border-2 border-dashed border-blue-200 text-center">
            <span id="dist_txt" class="text-xs font-black text-slate-400 italic tracking-tighter">SIN GPS</span>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3">
        <label class="bg-white p-4 rounded-3xl border text-center relative active:bg-slate-100">
            <span class="text-[10px] font-bold uppercase">Máquina</span>
            <input type="file" name="foto_maquina" capture="camera" accept="image/*" required class="absolute inset-0 opacity-0">
        </label>
        <label class="bg-white p-4 rounded-3xl border text-center relative active:bg-slate-100">
            <span class="text-[10px] font-bold uppercase">Fachada</span>
            <input type="file" name="foto_fachada" capture="camera" accept="image/*" required class="absolute inset-0 opacity-0">
        </label>
    </div>

    <select name="motivo" class="w-full p-4 bg-white rounded-2xl border shadow-sm outline-none" required>
        <option value="Ruta">Visita Ruta</option>
        <option value="Novedad">Novedad</option>
    </select>

    <textarea name="observacion" rows="2" class="w-full p-4 rounded-2xl border outline-none resize-none" placeholder="Observaciones..."></textarea>
    <input type="hidden" id="h_dist" name="distancia_metros">

    <button type="submit" id="btn" disabled class="w-full bg-slate-300 text-white font-black py-5 rounded-[25px] uppercase shadow-lg transition-all">
        Guardar Reporte
    </button>
</form>

<script>
    const maestro = {{ maestro_json | safe }};
    let lat, lon;

    navigator.geolocation.watchPosition(p => {
        lat = p.coords.latitude; lon = p.coords.longitude;
        if(document.getElementById('i_poc').value) sync('Poc');
    }, null, {enableHighAccuracy:true});

    function sync(tipo) {
        const val = (tipo === 'Poc') ? document.getElementById('i_poc').value : document.getElementById('i_bmb').value;
        const item = maestro.find(x => tipo === 'Poc' ? x.Poc === val : x.BMB === val);
        
        if(item && lat) {
            document.getElementById('i_poc').value = item.Poc;
            document.getElementById('i_bmb').value = item.BMB;
            const [rLat, rLon] = item.Ubicacion_Ref.split(',').map(Number);
            const d = Math.round(6371000 * 2 * Math.atan2(Math.sqrt(Math.sin(((rLat-lat)*Math.PI/180)/2)**2 + Math.cos(lat*Math.PI/180)*Math.cos(rLat*Math.PI/180)*Math.sin(((rLon-lon)*Math.PI/180)/2)**2), Math.sqrt(1-(Math.sin(((rLat-lat)*Math.PI/180)/2)**2 + Math.cos(lat*Math.PI/180)*Math.cos(rLat*Math.PI/180)*Math.sin(((rLon-lon)*Math.PI/180)/2)**2))));
            
            const t = document.getElementById('dist_txt');
            t.innerText = d + " MTS AL PUNTO";
            t.className = d > 150 ? "text-xs font-black text-red-600" : "text-xs font-black text-green-600";
            document.getElementById('h_dist').value = d;
            
            const b = document.getElementById('btn');
            b.disabled = false; b.classList.replace('bg-slate-300', 'bg-blue-900');
        }
    }
</script>
{% endblock %}
