<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F2F2F7; padding: 15px; margin: 0; }
        .search { width: 100%; padding: 12px; border: none; border-radius: 12px; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .label { font-size: 11px; color: #8e8e93; font-weight: 600; text-transform: uppercase; }
        .val { font-size: 14px; color: #1c1c1e; }
        .btn-add { background: #007AFF; color: white; text-decoration: none; padding: 10px 20px; border-radius: 10px; display: inline-block; margin-bottom: 20px; font-weight: 600; }
    </style>
</head>
<body>
    <a href="/index" class="btn-add">+ Nuevo</a>
    <input type="text" id="bus" class="search" placeholder="Buscar por Nombre o BMB..." onkeyup="filter()">
    <div id="list">
        {% for item in datos %}
        <div class="card" data-txt="{{ item['Nombre de punto']|lower }} {{ item['BMB'] }}">
            <div class="row"><strong>{{ item['Nombre de punto'] }}</strong><span>BMB: {{ item['BMB'] }}</span></div>
            <div class="row"><div class="col"><div class="label">Ciudad</div><div class="val">{{ item['Ciudad'] }}</div></div><div class="col" style="text-align:right"><div class="label">ID</div><div class="val">{{ item['Id'] }}</div></div></div>
            <div class="label">Dirección</div><div class="val">{{ item['Direccion'] }}</div>
        </div>
        {% endfor %}
    </div>
    <script>
        function filter() {
            let q = document.getElementById('bus').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.dataset.txt.includes(q) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
