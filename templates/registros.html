{% extends "base.html" %}
{% block content %}
<div class="space-y-6">
    <div class="bg-white p-6 rounded-[35px] shadow-lg border border-slate-100">
        <form action="/registros" method="GET" class="grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
            <div class="md:col-span-2">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Búsqueda rápida</label>
                <input type="text" name="busqueda" value="{{ busqueda }}" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-xs font-bold" placeholder="POC o BMB...">
            </div>
            <div class="grid grid-cols-2 gap-2 md:col-span-2">
                <input type="date" name="f_inicio" value="{{ f_inicio }}" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-xs font-bold" required>
                <input type="date" name="f_fin" value="{{ f_fin }}" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-xs font-bold" required>
            </div>
            <button type="submit" class="w-full bg-blue-900 text-white font-black py-4 rounded-xl uppercase text-[10px] md:col-span-4 shadow-md">Aplicar Filtros</button>
        </form>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
        {% for r in registros %}
        <div class="bg-white p-5 rounded-[40px] shadow-md border border-slate-100 flex flex-col">
            <div class="flex justify-between items-start mb-3">
                <span class="text-[8px] font-black text-blue-900 bg-blue-50 px-3 py-1 rounded-full uppercase">{{ r.funcionario }}</span>
                <span class="text-[8px] text-slate-400 font-bold italic">{{ r.fecha }}</span>
            </div>
            
            <h3 class="font-black text-slate-800 text-sm mb-1 uppercase tracking-tight">{{ r.poc }}</h3>
            <p class="text-[10px] font-bold text-blue-600 mb-4 border-b pb-2 uppercase">BMB: {{ r.bmb }} | {{ r.motivo }}</p>

            <div class="grid grid-cols-2 gap-2 mb-4">
                <img src="/foto/{{ r.foto_maquina_id }}" class="w-full h-36 object-cover rounded-[25px] shadow-sm border">
                <img src="/foto/{{ r.foto_fachada_id }}" class="w-full h-36 object-cover rounded-[25px] shadow-sm border">
            </div>

            {% if r.observacion %}
            <div class="bg-slate-50 p-4 rounded-2xl mb-4 border-l-4 border-blue-900 shadow-inner">
                <p class="text-[11px] text-slate-600 italic leading-snug">"{{ r.observacion }}"</p>
            </div>
            {% endif %}

            <div class="mt-auto">
                <p class="text-[7px] font-mono text-slate-300 text-center uppercase tracking-widest border-t pt-2">GPS: {{ r.gps_real }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
